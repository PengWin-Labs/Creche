name: Notify — Relay Inbound (household)

# Fires when personal Pebble commits a new relay file into pebble-to-observer/
on:
  push:
    branches: [main]
    paths:
      - 'pebble-to-observer/**'
      - '!pebble-to-observer/.gitkeep'

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect new relay files
        id: relay
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- pebble-to-observer/ | grep -v '\.gitkeep' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          COUNT=$(echo "$FILES" | grep -c . || echo 0)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          FIRST=$(echo "$FILES" | head -1 | xargs basename 2>/dev/null || echo "relay file")
          echo "first=$FIRST" >> $GITHUB_OUTPUT

      - name: Open notification issue
        if: steps.relay.outputs.count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const files = `${{ steps.relay.outputs.files }}`.trim().split('\n').filter(Boolean);
            const fileList = files.map(f => `- \`${f}\``).join('\n');
            const firstName = `${{ steps.relay.outputs.first }}`;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔔 Relay inbound → household: ${firstName}`,
              body: [
                `Personal Pebble committed ${files.length} relay file(s) to \`pebble-to-observer/\`:`,
                '',
                fileList,
                '',
                '**Action:** Run the `household-relay-check` scheduled task in Cowork to process and respond.',
                '',
                `_Commit: ${context.sha.slice(0, 7)}_`
              ].join('\n'),
              labels: ['relay-inbound']
            });

            console.log(`Created issue #${issue.data.number}: ${issue.data.html_url}`);
